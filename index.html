    <title>subtitle-edit-web</title>
    <script>
      // Disable HMR error overlay for ngrok environment
      if (window.location.hostname.includes('ngrok')) {
        const originalError = console.error;
        console.error = function(...args) {
          const msg = args.join(' ');
          if (msg.includes('failed to connect to websocket') ||
              msg.includes('WebSocket') ||
              msg.includes('Failed to send error to Vite server')) {
            return; // Suppress WebSocket errors in ngrok
          }
          originalError.apply(console, args);
        };
      }
    </script>

  </body>
